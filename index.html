<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전경수 교수님 정년퇴임 기념 방명록</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #fdfbf7; }
        .font-serif { font-family: 'Noto Serif KR', serif; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-12">
            <h1 class="font-serif text-4xl font-bold text-[#003E33] mb-4">전경수 교수님 퇴임 기념 방명록</h1>
            <p class="text-gray-600">교수님의 새로운 앞날을 응원하며 감사의 한마디를 남겨주세요.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="md:col-span-1 bg-white p-6 rounded-xl shadow-md border border-gray-100 h-fit">
                <form id="guestbookForm" onsubmit="submitMessage(event)">
                    <div class="mb-4">
                        <label class="block text-sm font-bold mb-1">성함</label>
                        <input type="text" id="gbName" required class="w-full border p-2 rounded text-sm outline-none focus:ring-2 focus:ring-[#003E33]">
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-bold mb-1">비밀번호</label>
                        <input type="password" id="gbPassword" required class="w-full border p-2 rounded text-sm outline-none focus:ring-2 focus:ring-[#003E33]">
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-bold mb-1">내용</label>
                        <textarea id="gbContent" rows="4" required class="w-full border p-2 rounded text-sm outline-none resize-none focus:ring-2 focus:ring-[#003E33]"></textarea>
                    </div>
                    <button type="submit" id="submitBtn" class="w-full bg-[#003E33] text-white py-2 rounded font-bold hover:bg-[#002821] transition">메시지 남기기</button>
                </form>
            </div>

            <div class="md:col-span-2">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-[#003E33]">남겨주신 메시지</h2>
                    <span id="messageCount" class="text-sm font-bold text-gray-500">불러오는 중...</span>
                </div>
                <div id="messageList" class="space-y-4">
                    </div>
            </div>
        </div>
    </div>

    <div id="deleteModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-lg max-w-sm w-full">
            <h3 class="font-bold mb-4">비밀번호 확인</h3>
            <input type="password" id="delPw" class="w-full border p-2 mb-4 rounded" placeholder="비밀번호 입력">
            <input type="hidden" id="delId">
            <div class="flex justify-end gap-2">
                <button onclick="closeModal()" class="px-4 py-2 text-gray-500">취소</button>
                <button onclick="requestDelete()" class="px-4 py-2 bg-red-600 text-white rounded">삭제</button>
            </div>
        </div>
    </div>

    <script>
        // [수정] 본인의 구글 웹 앱 URL을 여기에 붙여넣으세요
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzFlykmVJqBrDFLacYgb9PuUAhyFXIZr3q0h0oWrIZzbPXZZ5rqnUB5Zs9yp-LK7k28/exec';

        // 1. 메시지 불러오기 (JSONP)
        function fetchMessages() {
            const callbackName = 'jsonp_' + Date.now();
            window[callbackName] = function(data) {
                const list = document.getElementById('messageList');
                document.getElementById('messageCount').textContent = `총 ${data.length}개`;
                list.innerHTML = '';
                data.reverse().forEach(msg => {
                    const div = document.createElement('div');
                    div.className = 'bg-white p-4 rounded-lg shadow-sm border border-gray-50 relative group';
                    div.innerHTML = `
                        <div class="flex justify-between text-xs text-gray-400 mb-2">
                            <span class="font-bold text-[#003E33] text-sm">${msg.name}</span>
                            <span>${msg.date}</span>
                        </div>
                        <p class="text-sm text-gray-700 whitespace-pre-wrap">${msg.content}</p>
                        <button onclick="openModal('${msg.id}')" class="absolute top-2 right-2 text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition">✕</button>
                    `;
                    list.appendChild(div);
                });
                delete window[callbackName];
            };

            const script = document.createElement('script');
            script.src = `${GOOGLE_SCRIPT_URL}?action=read&callback=${callbackName}`;
            document.body.appendChild(script);
            document.body.removeChild(script);
        }

        // 2. 메시지 등록 (JSONP)
        function submitMessage(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const name = document.getElementById('gbName').value;
            const pw = document.getElementById('gbPassword').value;
            const ct = document.getElementById('gbContent').value;
            const callbackName = 'jsonp_' + Date.now();

            btn.disabled = true;
            btn.textContent = "등록 중...";

            window[callbackName] = function(res) {
                if(res.result === 'success') {
                    alert("메시지가 등록되었습니다.");
                    document.getElementById('guestbookForm').reset();
                    fetchMessages();
                }
                btn.disabled = false;
                btn.textContent = "메시지 남기기";
                delete window[callbackName];
            };

            const script = document.createElement('script');
            script.src = `${GOOGLE_SCRIPT_URL}?action=insert&name=${encodeURIComponent(name)}&password=${encodeURIComponent(pw)}&content=${encodeURIComponent(ct)}&callback=${callbackName}`;
            document.body.appendChild(script);
            document.body.removeChild(script);
        }

        // 3. 메시지 삭제 (JSONP)
        function openModal(id) {
            document.getElementById('delId').value = id;
            document.getElementById('delPw').value = '';
            document.getElementById('deleteModal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('deleteModal').classList.add('hidden'); }

        function requestDelete() {
            const id = document.getElementById('delId').value;
            const pw = document.getElementById('delPw').value;
            const callbackName = 'jsonp_' + Date.now();

            window[callbackName] = function(res) {
                if(res.result === 'success') {
                    alert("삭제되었습니다.");
                    closeModal();
                    fetchMessages();
                } else {
                    alert("비밀번호가 틀립니다.");
                }
                delete window[callbackName];
            };

            const script = document.createElement('script');
            script.src = `${GOOGLE_SCRIPT_URL}?action=delete&id=${id}&password=${encodeURIComponent(pw)}&callback=${callbackName}`;
            document.body.appendChild(script);
            document.body.removeChild(script);
        }

        // 초기 실행
        fetchMessages();
    </script>
</body>
</html>
